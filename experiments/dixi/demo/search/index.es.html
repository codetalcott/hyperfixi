<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>El Proyecto Fixi — demo dixi M2.5</title>
<link rel="stylesheet" href="search.css">

<!-- dixi reescribe los nombres de atributos fx-* y on-* antes de que fixi/moxi los lean -->
<script src="../../dixi.js"></script>
<script src="../../locales/es.js"></script>

<script src="https://unpkg.com/fixi-js@0.9.4/fixi.js"></script>
<script src="https://cdn.jsdelivr.net/gh/bigskysoftware/moxi@6760e60/moxi.js"></script>
</head>
<body>

<header class="top">
  <button class="toggle" on-clic="document.body.classList.toggle('sidebar-collapsed')" aria-label="Mostrar/ocultar barra lateral">☰</button>
  <h1>El Proyecto Fixi</h1>
  <nav class="locales" aria-label="Idioma">
    <a href="index.en.html">EN</a>
    <a href="index.es.html" class="current">ES</a>
    <a href="index.ja.html">JA</a>
    <a href="index.ar.html">AR</a>
  </nav>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="search">
      <input type="search" placeholder="Buscar documentación..."
        on-entrada="let v = event.target.value.toLowerCase(); for (let li of q('.doc-item')) li.hidden = v &amp;&amp; !li.textContent.toLowerCase().includes(v);">
    </div>
    <ul class="doc-list">
      <li class="doc-item"><button fx-acción="docs/about.html" fx-objetivo="#content" fx-intercambio="innerHTML">Acerca de</button></li>
      <li class="doc-item"><button fx-acción="docs/tour.html"  fx-objetivo="#content" fx-intercambio="innerHTML">Las Bibliotecas</button></li>
      <li class="doc-item"><button fx-acción="docs/fixi.html"  fx-objetivo="#content" fx-intercambio="innerHTML">fixi.js</button></li>
      <li class="doc-item"><button fx-acción="docs/moxi.html"  fx-objetivo="#content" fx-intercambio="innerHTML">moxi.js</button></li>
      <li class="doc-item"><button fx-acción="docs/paxi.html"  fx-objetivo="#content" fx-intercambio="innerHTML">paxi.js</button></li>
      <li class="doc-item"><button fx-acción="docs/ssexi.html" fx-objetivo="#content" fx-intercambio="innerHTML">ssexi.js</button></li>
      <li class="doc-item"><button fx-acción="docs/rexi.html"  fx-objetivo="#content" fx-intercambio="innerHTML">rexi.js</button></li>
      <li class="doc-item"><button fx-acción="docs/demos.html" fx-objetivo="#content" fx-intercambio="innerHTML">Demos</button></li>
    </ul>
  </aside>

  <main class="content" id="content">
    <p class="placeholder">Selecciona un documento de la barra lateral para leerlo aquí.</p>
  </main>
</div>

<!-- Fijaciones de prueba M2.6: modificadores + live + mx-ignore. Oculto. -->
<div hidden id="m26-fixtures">
  <button id="m26-mod-btn" on-clic.prevenir.una-vez="">m</button>
  <output id="m26-live-out" vivo=""></output>
  <div id="m26-ignored" mx-ignorar>i</div>
</div>

</body>
</html>
