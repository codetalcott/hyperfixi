<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>HyperFixi ドキュメント — dixi M2.5 デモ</title>
<link rel="stylesheet" href="search.css">

<!-- dixi が fx-* と on-* の日本語属性名を fixi/moxi が読む前に正規化する -->
<script src="../../dixi.js"></script>
<script src="../../locales/ja.js"></script>

<script src="https://unpkg.com/fixi-js@0.9.4/fixi.js"></script>
<script src="https://cdn.jsdelivr.net/gh/bigskysoftware/moxi@6760e60/moxi.js"></script>
</head>
<body>

<header class="top">
  <button class="toggle" on-クリック="document.body.classList.toggle('sidebar-collapsed')" aria-label="サイドバーの開閉">☰</button>
  <h1>HyperFixi ドキュメント</h1>
  <nav class="locales" aria-label="言語">
    <a href="index.en.html">EN</a>
    <a href="index.es.html">ES</a>
    <a href="index.ja.html" class="current">JA</a>
    <a href="index.ar.html">AR</a>
  </nav>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="search">
      <input type="search" placeholder="ドキュメント検索..."
        on-入力="let v = event.target.value.toLowerCase(); for (let li of q('.doc-item')) li.hidden = v &amp;&amp; !li.textContent.toLowerCase().includes(v);">
    </div>
    <ul class="doc-list">
      <li class="doc-item"><button fx-アクション="docs/about.html"           fx-ターゲット="#content" fx-スワップ="innerHTML">概要</button></li>
      <li class="doc-item"><button fx-アクション="docs/architecture.html"    fx-ターゲット="#content" fx-スワップ="innerHTML">アーキテクチャ</button></li>
      <li class="doc-item"><button fx-アクション="docs/bundles.html"         fx-ターゲット="#content" fx-スワップ="innerHTML">バンドル</button></li>
      <li class="doc-item"><button fx-アクション="docs/api-v2.html"          fx-ターゲット="#content" fx-スワップ="innerHTML">API v2</button></li>
      <li class="doc-item"><button fx-アクション="docs/examples-dom.html"    fx-ターゲット="#content" fx-スワップ="innerHTML">DOM の例</button></li>
      <li class="doc-item"><button fx-アクション="docs/examples-events.html" fx-ターゲット="#content" fx-スワップ="innerHTML">イベントの例</button></li>
      <li class="doc-item"><button fx-アクション="docs/semantic-intro.html"  fx-ターゲット="#content" fx-スワップ="innerHTML">セマンティックノード</button></li>
      <li class="doc-item"><button fx-アクション="docs/vite-quick.html"      fx-ターゲット="#content" fx-スワップ="innerHTML">Vite プラグイン</button></li>
    </ul>
  </aside>

  <main class="content" id="content">
    <p class="placeholder">サイドバーからドキュメントを選択して、ここで読んでください。</p>
  </main>
</div>

</body>
</html>
