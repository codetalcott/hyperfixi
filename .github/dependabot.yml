version: 2

updates:
  # Root npm workspace (packages/*, apps/*) — covered by the root package-lock.json
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 10
    groups:
      # One weekly PR for everything non-major. The former themed groups
      # (typescript/testing/build-tools/linting) were folded in here
      # 2026-07-13: each landed as its own weekly PR and every PR runs the
      # full CI matrix (~60 runner-min), with no per-theme review happening
      # in practice. Re-split a theme only if it gets its own merge policy
      # (e.g. auto-merge for linting).
      minor-and-patch:
        patterns:
          - '*'
        # Known group-breakers get individual PRs for deliberate handling.
        # Excluded 2026-07-14 so the rest of the group can go green + auto-merge
        # (#668 was the red PR).
        #
        # vitest: the old note here ("vitest 4.1.x mass-breaks the core test
        # transform") was WRONG and cost real debugging time. 4.1.x transforms
        # nothing differently — 4.1.6 and 4.1.10 declare an identical
        # `vite: ^6||^7||^8`. What changes is RESOLUTION: @vitest/ui@4.1.10
        # exact-pins peer vitest@4.1.10, so npm must nest vitest inside
        # packages/core, where it re-resolves vite to the highest match (8.1.4)
        # instead of the root's 7.3.6. Vite 8 dropped esbuild for Oxc, and Oxc
        # does not lower TC39 decorators — which core uses in 51 files — so
        # every decorated module dies with a locationless
        # `SyntaxError: Invalid or unexpected token`.
        # Diagnosis + the three DISPROVED fixes:
        # docs-internal/HANDOFF_vitest-oxc-decorators.md
        #
        # prettier: 3.9.5 reflows enough files to add lint errors.
        exclude-patterns:
          - 'vitest'
          - '@vitest/*'
          - 'prettier'
        update-types:
          - 'minor'
          - 'patch'
      # vitest + @vitest/* excluded above move as one unit: @vitest/ui
      # exact-pins its peer `vitest` version, so they are coupled by design
      # and the fix (docs-internal/HANDOFF_vitest-oxc-decorators.md) has to
      # touch all three together anyway. Bundled 2026-07-20 so the three
      # individual PRs (#694/695/696, identical failure) collapse into one
      # PR/one CI run per rebase instead of three.
      vitest-family:
        patterns:
          - 'vitest'
          - '@vitest/*'
        update-types:
          - 'minor'
          - 'patch'
      # One weekly PR for all majors instead of one PR per dependency. CI is
      # the reviewer: if this group PR goes red, add the offender to
      # exclude-patterns so it falls back to an individual PR for bisection.
      majors:
        patterns:
          - '*'
        # typescript majors carry real build risk and get an individual PR for
        # bisection: 6.x adds tsconfig deprecations (node10/baseUrl), 7.x is the
        # native (Go) compiler. See the ignore entry below (7.x deferred) and
        # docs-internal/SPIKE_vite-plus-toolchain.md.
        #
        # vscode-language{server,client} 10.x drop the `vscode-languageserver/
        # node.js` deep export path, so the LSP packages fail to build
        # (`TS2307: Cannot find module`, plus cascading implicit-any). Excluded
        # 2026-07-16 per the policy above — #710 held 13 majors hostage to this
        # one API break. They move together (shared upstream repo, matched
        # versions), so exclude both or neither.
        exclude-patterns:
          - 'typescript'
          - 'vscode-languageserver'
          - 'vscode-languageclient'
        update-types:
          - 'major'
      # vscode-languageserver + vscode-languageclient excluded above move as
      # one unit (shared upstream, matched versions — see the comment on the
      # exclusion). Bundled 2026-07-20 so the two individual PRs (#716/#717)
      # collapse into one PR/one CI run per rebase instead of two. typescript
      # stays solo — it needs individual bisection, not a partner.
      vscode-lsp:
        patterns:
          - 'vscode-languageserver'
          - 'vscode-languageclient'
        update-types:
          - 'major'
    # Named-deferred majors (release-bar item-4 leftovers,
    # docs-internal/MULTILINGUAL_NEXT_STEPS.md). Deferred via config instead
    # of perpetually-open PRs that re-run CI on every rebase — delete an
    # entry to take that bump deliberately.
    ignore:
      - dependency-name: 'chokidar'
        update-types: ['version-update:semver-major']
      - dependency-name: 'diff'
        update-types: ['version-update:semver-major']
      - dependency-name: 'inquirer'
        update-types: ['version-update:semver-major']
      - dependency-name: 'puppeteer'
        update-types: ['version-update:semver-major']
      # TypeScript 7 is the native (Go) port. The @typescript-eslint peer that
      # blocked it is gone (migrated to oxlint, #687), but the build toolchain
      # is not ready: tsc-free DTS needs `isolatedDeclarations` (72 violations
      # in packages/semantic alone) and the `moduleResolution: node10` /
      # `baseUrl` tsconfig deprecations must be migrated first. Allow 6.x (the
      # migration-bridge release) to flow as its own PR; defer the 7.x native
      # port until that work lands.
      #
      # The earlier "6.x probed clean, only config deprecations" note was wrong,
      # and the way it was wrong is worth remembering: the probe used `typecheck`
      # (`tsc --noEmit`), but 6.x's new diagnostics are EMIT-only, so a
      # noEmit probe cannot see them. Probing the real `build:types` found TS5011
      # in 14 packages (fixed in #713) and, behind it, 55 node-type errors in
      # core (TS5011 is a config error that aborts before typechecking, so it
      # masks everything downstream). 6.x is a real migration, not a bump.
      # See docs-internal/SPIKE_vite-plus-toolchain.md.
      - dependency-name: 'typescript'
        versions: ['>=7.0.0']
    labels:
      - 'dependencies'

  # Standalone npm root (own package-lock.json, not part of the workspaces)
  - package-ecosystem: 'npm'
    directory: '/protocol/typescript'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        patterns:
          - '*'
        update-types:
          - 'minor'
          - 'patch'
      majors:
        patterns:
          - '*'
        update-types:
          - 'major'
    labels:
      - 'dependencies'

  # Go modules (the go-client currently carries the x/crypto critical alerts)
  - package-ecosystem: 'gomod'
    directories:
      - '/clients/go-client'
      - '/protocol/go'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 5
    groups:
      go-deps:
        patterns:
          - '*'
        update-types:
          - 'minor'
          - 'patch'
      go-majors:
        patterns:
          - '*'
        update-types:
          - 'major'
    labels:
      - 'dependencies'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    groups:
      actions:
        patterns:
          - '*'
    labels:
      - 'ci'
