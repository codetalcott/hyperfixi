name: Publish Packages

on:
  workflow_dispatch:
    inputs:
      version-type:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - current
          - patch
          - minor
          - major
          - prerelease
        default: 'current'
      npm-tag:
        description: 'npm dist-tag (latest, beta, next, etc.)'
        required: true
        type: string
        default: 'latest'
      dry-run:
        description: 'Dry run (do not actually publish)'
        required: false
        type: boolean
        default: false
      packages:
        description: 'Packages to publish (comma-separated subset, or "all")'
        required: false
        type: string
        default: 'all'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_OPTIONS: --max-old-space-size=4096

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      version: ${{ steps.version.outputs.version }}
    permissions:
      contents: write
      id-token: write # Required for npm trusted publishing (OIDC provenance)

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'
          # No auth-token — OIDC trusted publishing handles authentication

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: |
          # Delete stale lockfile — workspace package versions may differ from lockfile
          # after a version bump. Regenerate fresh so workspace symlinks resolve correctly.
          rm -f package-lock.json
          npm install

      - name: Build all packages
        run: |
          # Build order mirrors .github/workflows/ci.yml (which is known-green).
          # Every workspace dep is built — including the private ones
          # (domain-toolkit, mcp-multilingual-intent, developer-tools) — because
          # their dist/ must exist for tsc to resolve cross-package imports.
          # (intent and domain-config are public, published packages.)
          npm run build --prefix packages/intent
          npm run build --prefix packages/framework
          npm run build --prefix packages/domain-bdd
          npm run build --prefix packages/domain-sql
          npm run build --prefix packages/domain-jsx
          npm run build --prefix packages/domain-todo
          npm run build --prefix packages/domain-behaviorspec
          npm run build --prefix packages/domain-llm
          npm run build --prefix packages/domain-flow
          npm run build --prefix packages/domain-voice
          npm run build --prefix packages/domain-learn
          npm run build --prefix packages/semantic
          npm run build --prefix packages/domain-toolkit
          npm run build --prefix packages/domain-config
          npm run build --prefix packages/behaviors
          npm run build --prefix packages/core
          npm run build --prefix packages/patterns-reference
          npm run build --prefix packages/i18n
          npm run build --prefix packages/hyperscript-adapter
          npm run build --prefix packages/aot-compiler
          npm run build --prefix packages/compilation-service
          npm run build --prefix packages/planner
          npm run build --prefix packages/mcp-server
          npm run build --prefix packages/mcp-multilingual-intent
          npm run build --prefix packages/developer-tools
          npm run build --prefix packages/server-bridge
          npm run build --prefix packages/vite-plugin
          npm run build --prefix packages/language-server
          # Plugin packages (HyperfixiPlugin) — reactivity before components (components depends on reactivity)
          npm run build --prefix packages/reactivity
          npm run build --prefix packages/components
          npm run build --prefix packages/speech
          # intent-element depends on @lokascript/intent + @hyperfixi/core (both built above)
          npm run build --prefix packages/intent-element
          npm run build --prefix packages/types-browser
          npm run build --prefix packages/testing-framework
          npm run build --prefix packages/mcp-server-hyperscript
          npm run build --prefix packages/language-server-hyperscript
          npm run build --prefix packages/multilingual-hyperscript
          npm run build --prefix packages/hyperscript-tools-i18n
          # Core browser bundles depend on i18n/dist/browser.js + reactivity/dist (for hybrid-hx-v4)
          npm run build:browser --prefix packages/core

      - name: Run tests
        run: |
          npm test --prefix packages/core
          npm test --prefix packages/semantic -- --run
          npm test --prefix packages/i18n -- --run
          npm test --prefix packages/hyperscript-adapter -- --run
          npm test --prefix packages/hyperscript-tools-i18n
          npm test --prefix packages/compilation-service -- --run
          npm test --prefix packages/mcp-server -- --run

      - name: Calculate new version
        id: version
        run: |
          CURRENT=$(node -p "require('./packages/core/package.json').version")
          echo "Current version: $CURRENT"
          VERSION_TYPE="${{ github.event.inputs.version-type }}"

          if [ "$VERSION_TYPE" = "current" ]; then
            NEW="$CURRENT"
          else
            cd packages/core
            npm version "$VERSION_TYPE" --no-git-tag-version > /dev/null 2>&1
            NEW=$(node -p "require('./package.json').version")
            cd ../..
            git checkout packages/core/package.json
          fi

          echo "New version: $NEW"
          echo "version=$NEW" >> $GITHUB_OUTPUT

      - name: Sync all package versions
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "Setting all packages to $VERSION (and internal dep ranges to ^$VERSION)"
          # set-version.cjs bumps every package + root + lerna.json AND rewrites
          # internal workspace dep ranges to ^VERSION — so published tarballs
          # carry accurate constraints (npm has no workspace: protocol).
          node scripts/set-version.cjs "$VERSION"

      - name: Publish packages
        env:
          # NPM_TOKEN required for initial publish of new packages
          # (OIDC trusted publishing only works for packages already on npm)
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -o pipefail
          VERSION="${{ steps.version.outputs.version }}"
          DRY_RUN="${{ github.event.inputs.dry-run }}"
          FILTER="${{ github.event.inputs.packages }}"
          FAILED=""

          # All packages in dependency order
          # Packages that have version-lock with core use the same VERSION
          # New domain/framework packages start at 1.0.0 but will be bumped if VERSION_TYPE != current
          # Plugin packages (reactivity, components, speech) listed after behaviors
          # because components depends on reactivity; both depend on @hyperfixi/core
          # (which is in position 2). speech depends on core only.
          # intent is first — @hyperfixi/core and @lokascript/framework depend on it.
          # domain-config sits after the domain-* packages + framework (its deps).
          # planner sits before mcp-server (which depends on it).
          # intent-element depends on intent + core, so it follows them.
          ALL_PACKAGES="intent semantic core i18n hyperscript-adapter patterns-reference \
                        framework server-bridge types-browser aot-compiler \
                        domain-sql domain-bdd domain-llm domain-todo domain-behaviorspec domain-jsx domain-flow domain-voice domain-learn domain-config \
                        compilation-service planner mcp-server vite-plugin \
                        behaviors reactivity components speech intent-element testing-framework language-server \
                        mcp-server-hyperscript language-server-hyperscript multilingual-hyperscript \
                        hyperscript-tools-i18n"

          for pkg in $ALL_PACKAGES; do
            [ ! -f "packages/$pkg/package.json" ] && continue

            # Skip if not in filter (unless filter is "all")
            if [ "$FILTER" != "all" ]; then
              PKG_NAME=$(node -p "require('./packages/$pkg/package.json').name")
              echo "$FILTER" | grep -qF "$PKG_NAME" || continue
            fi

            PKG_NAME=$(node -p "require('./packages/$pkg/package.json').name")
            PKG_VER=$(node -p "require('./packages/$pkg/package.json').version")
            IS_PRIVATE=$(node -p "require('./packages/$pkg/package.json').private || false")
            [ "$IS_PRIVATE" = "true" ] && continue

            echo "→ $PKG_NAME@$PKG_VER"

            if [ "$DRY_RUN" = "true" ]; then
              (cd "packages/$pkg" && npm publish --dry-run --access public \
                --tag "${{ github.event.inputs.npm-tag }}" 2>&1 | tail -3) || true
            else
              (cd "packages/$pkg" && npm publish --access public --provenance \
                --tag "${{ github.event.inputs.npm-tag }}" 2>&1 | tee /tmp/pub-$pkg.log) || {
                if grep -q "previously published\|already exists\|cannot publish over" /tmp/pub-$pkg.log 2>/dev/null; then
                  echo "  ⏭ already published, skipping"
                elif grep -q "Scope not found" /tmp/pub-$pkg.log 2>/dev/null; then
                  echo "  ⚠ scope not found on npm — create @${PKG_NAME%%/*} scope first"
                else
                  echo "  ✗ FAILED"
                  FAILED="$FAILED $PKG_NAME"
                fi
              }
            fi
          done

          if [ -n "$FAILED" ]; then
            echo "::error::Failed:$FAILED"
            exit 1
          fi

      - name: Commit version changes
        # When version-type=current, the bump was already committed by hand
        # before this workflow was dispatched — there is nothing to commit
        # here, and running the step risks corrupting state (see lockfile
        # handling below). Skip cleanly so tags + release still run.
        if: ${{ github.event.inputs.dry-run == 'false' && github.event.inputs.version-type != 'current' }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BRANCH="${{ github.ref_name }}"

          # The "Install dependencies" step earlier in this job did
          # `rm -f package-lock.json && npm install`, which leaves an
          # unstaged lockfile change in the worktree. We intentionally do
          # NOT commit it (would break the next run's `npm install` because
          # it would reference workspace-package versions that are now
          # higher-than-published-at-the-time). Restore it from HEAD so the
          # subsequent `git pull` doesn't refuse with "your local changes
          # would be overwritten by merge".
          git checkout -- package-lock.json 2>/dev/null || true

          git add packages/*/package.json package.json lerna.json 2>/dev/null || true
          git commit -m "chore: release v$VERSION" || echo "No changes to commit"

          # Pull from the SAME branch the workflow ran on, not hardcoded
          # `main` — release branches (release/x.y.z) need to stay on the
          # release branch, not pull main into themselves.
          git pull --rebase origin "$BRANCH" || git pull --no-rebase origin "$BRANCH"
          git push origin HEAD:"$BRANCH"

      - name: Create Git tags
        if: ${{ github.event.inputs.dry-run == 'false' }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git tag -f "v$VERSION"
          git push origin "v$VERSION" --force

      - name: Create GitHub Release
        if: ${{ github.event.inputs.dry-run == 'false' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ github.event.inputs.npm-tag }}"
          PRERELEASE=$( [ "$TAG" != "latest" ] && echo "--prerelease" || echo "" )
          gh release create "v$VERSION" \
            --title "v$VERSION" $PRERELEASE \
            --generate-notes || echo "Release already exists"

      - name: Summary
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          {
            echo "## Publication Summary"
            echo "**Version**: $VERSION | **Tag**: ${{ github.event.inputs.npm-tag }} | **Dry run**: ${{ github.event.inputs.dry-run }}"
            echo ""
            echo "### Packages published"
            for pkg in semantic core i18n hyperscript-adapter patterns-reference \
                       framework server-bridge types-browser aot-compiler \
                       domain-sql domain-bdd domain-llm domain-todo domain-behaviorspec domain-jsx domain-flow domain-voice domain-learn \
                       compilation-service mcp-server vite-plugin \
                       behaviors testing-framework language-server \
                       mcp-server-hyperscript language-server-hyperscript multilingual-hyperscript \
                       hyperscript-tools-i18n; do
              [ -f "packages/$pkg/package.json" ] || continue
              IS_PRIVATE=$(node -p "require('./packages/$pkg/package.json').private || false")
              [ "$IS_PRIVATE" = "true" ] && continue
              PKG_NAME=$(node -p "require('./packages/$pkg/package.json').name")
              PKG_VER=$(node -p "require('./packages/$pkg/package.json').version")
              echo "- \`$PKG_NAME@$PKG_VER\`"
            done
          } >> $GITHUB_STEP_SUMMARY

  release-smoke:
    name: Release smoke test
    needs: publish
    if: ${{ github.event.inputs.dry-run == 'false' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium

      - name: Run release smoke test
        run: |
          VERSION="${{ needs.publish.outputs.version }}"
          # A fresh publish can take a few minutes to propagate across the npm
          # CDN. Retry the harness up to 3 times with a 90s backoff.
          for attempt in 1 2 3; do
            echo "::group::release-smoke attempt $attempt (v$VERSION)"
            if node examples/release-smoke/run.mjs "$VERSION"; then
              echo "::endgroup::"
              exit 0
            fi
            echo "::endgroup::"
            echo "attempt $attempt failed; waiting 90s for npm CDN propagation…"
            sleep 90
          done
          echo "::error::release smoke test failed after 3 attempts"
          exit 1
