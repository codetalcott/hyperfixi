name: Pre-Publish Check

on:
  workflow_dispatch:
    inputs:
      packages:
        description: 'Packages to check (comma-separated, e.g., core,semantic,i18n or "all")'
        required: true
        type: string
        default: 'all'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-publish-check:
    name: Validate Publication Readiness
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Parse package list
        id: packages
        run: |
          PACKAGES="${{ github.event.inputs.packages }}"
          if [ "$PACKAGES" = "all" ]; then
            PACKAGES="intent,framework,semantic,core,i18n,hyperscript-adapter,patterns-reference,server-bridge,types-browser,domain-sql,domain-bdd,domain-llm,domain-todo,domain-behaviorspec,domain-jsx,domain-flow,domain-voice,domain-learn,domain-config,aot-compiler,compilation-service,planner,mcp-server,vite-plugin,behaviors,reactivity,components,speech,intent-element,testing-framework,language-server,mcp-server-hyperscript,language-server-hyperscript,multilingual-hyperscript"
          fi
          echo "Checking packages: $PACKAGES"
          echo "packages=$PACKAGES" >> $GITHUB_OUTPUT

      - name: Check versions
        id: versions
        run: |
          echo "## Package Versions" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Package | Version | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|---------|--------|" >> $GITHUB_STEP_SUMMARY

          IFS=',' read -ra PKG_ARRAY <<< "${{ steps.packages.outputs.packages }}"
          for pkg in "${PKG_ARRAY[@]}"; do
            pkg=$(echo "$pkg" | xargs)
            if [ -f "packages/$pkg/package.json" ]; then
              VERSION=$(node -p "require('./packages/$pkg/package.json').version")
              PRIVATE=$(node -p "require('./packages/$pkg/package.json').private || false")

              if [ "$PRIVATE" = "true" ]; then
                echo "| $(node -p "require('./packages/$pkg/package.json').name" 2>/dev/null || echo "$pkg") | $VERSION | ⚠️ Private |" >> $GITHUB_STEP_SUMMARY
              else
                echo "| $(node -p "require('./packages/$pkg/package.json').name" 2>/dev/null || echo "$pkg") | $VERSION | ✅ Public |" >> $GITHUB_STEP_SUMMARY
              fi
            else
              echo "| $(node -p "require('./packages/$pkg/package.json').name" 2>/dev/null || echo "$pkg") | N/A | ❌ Not found |" >> $GITHUB_STEP_SUMMARY
              echo "versions: packages/$pkg not found" >> "$RUNNER_TEMP/prepublish-failures.txt"
            fi
          done

      - name: Check required files
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Required Files Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Package | README | CHANGELOG | LICENSE | package.json |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|-----------|---------|--------------|" >> $GITHUB_STEP_SUMMARY

          IFS=',' read -ra PKG_ARRAY <<< "${{ steps.packages.outputs.packages }}"
          for pkg in "${PKG_ARRAY[@]}"; do
            pkg=$(echo "$pkg" | xargs)
            if [ -d "packages/$pkg" ]; then
              README="❌"
              CHANGELOG="❌"
              LICENSE="❌"
              PACKAGE="❌"

              [ -f "packages/$pkg/README.md" ] && README="✅"
              [ -f "packages/$pkg/CHANGELOG.md" ] && CHANGELOG="✅"
              [ -f "packages/$pkg/LICENSE" ] || [ -f "LICENSE" ] && LICENSE="✅"
              [ -f "packages/$pkg/package.json" ] && PACKAGE="✅"

              echo "| $(node -p "require('./packages/$pkg/package.json').name" 2>/dev/null || echo "$pkg") | $README | $CHANGELOG | $LICENSE | $PACKAGE |" >> $GITHUB_STEP_SUMMARY
            fi
          done

      - name: Build dependencies first
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Build Dependencies" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Building core packages (required for typecheck)..." >> $GITHUB_STEP_SUMMARY

          # Build in dependency order (matches ci.yml and publish.yml).
          # semantic MUST precede the domain-* packages: their vocab modules
          # import @lokascript/semantic/languages/*, so domain-bdd's
          # build:types fails without semantic's dist. This list used to have
          # domain-* first, which produced four spurious "⚠ build failed"
          # warnings on every run (the packages then built fine in the later
          # Build check step, once semantic/dist existed).
          BUILD_ORDER="intent framework semantic domain-bdd domain-sql domain-jsx domain-todo domain-behaviorspec domain-llm domain-flow domain-voice domain-learn behaviors core patterns-reference i18n hyperscript-adapter aot-compiler compilation-service planner mcp-server server-bridge types-browser vite-plugin language-server reactivity realtime components speech intent-element"

          for pkg in $BUILD_ORDER; do
            if [ -d "packages/$pkg" ]; then
              PKG_NAME=$(node -p "require('./packages/$pkg/package.json').name" 2>/dev/null || echo "$pkg")
              echo "Building $PKG_NAME..."
              npm run build --prefix "packages/$pkg" 2>&1 || echo "  ⚠ build failed for $pkg"
            fi
          done

          # Browser bundles (requires i18n/dist)
          if [ -d "packages/core" ]; then
            npm run build:browser --prefix packages/core 2>&1 || echo "  ⚠ browser build failed"
          fi

          echo "✅ Dependency builds complete" >> $GITHUB_STEP_SUMMARY

      - name: TypeCheck
        run: |
          set -o pipefail
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## TypeScript Compilation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          IFS=',' read -ra PKG_ARRAY <<< "${{ steps.packages.outputs.packages }}"
          for pkg in "${PKG_ARRAY[@]}"; do
            pkg=$(echo "$pkg" | xargs)
            if [ -d "packages/$pkg" ] && [ -f "packages/$pkg/tsconfig.json" ]; then
              echo "Checking $(node -p "require('./packages/$pkg/package.json').name")..."
              if npm run typecheck --prefix "packages/$pkg" 2>&1 | tee /tmp/${pkg}-typecheck.log; then
                echo "✅ $(node -p "require('./packages/$pkg/package.json').name" 2>/dev/null || echo "$pkg") - TypeScript OK" >> $GITHUB_STEP_SUMMARY
              else
                echo "❌ $(node -p "require('./packages/$pkg/package.json').name" 2>/dev/null || echo "$pkg") - TypeScript errors found" >> $GITHUB_STEP_SUMMARY
                echo "typecheck: $pkg" >> "$RUNNER_TEMP/prepublish-failures.txt"
                echo "<details><summary>Errors</summary>" >> $GITHUB_STEP_SUMMARY
                echo "" >> $GITHUB_STEP_SUMMARY
                echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
                cat /tmp/${pkg}-typecheck.log >> $GITHUB_STEP_SUMMARY
                echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
                echo "</details>" >> $GITHUB_STEP_SUMMARY
              fi
            fi
          done

      - name: Run tests
        run: |
          set -o pipefail
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          IFS=',' read -ra PKG_ARRAY <<< "${{ steps.packages.outputs.packages }}"
          for pkg in "${PKG_ARRAY[@]}"; do
            pkg=$(echo "$pkg" | xargs)
            if [ -d "packages/$pkg" ] && [ -f "packages/$pkg/package.json" ]; then
              if grep -q '"test"' "packages/$pkg/package.json"; then
                echo "Testing $(node -p "require('./packages/$pkg/package.json').name")..."
                if npm test --prefix "packages/$pkg" 2>&1 | tee /tmp/${pkg}-test.log; then
                  TESTS=$(grep -o '[0-9]* passed' /tmp/${pkg}-test.log | head -1 || echo "0 passed")
                  echo "✅ $(node -p "require('./packages/$pkg/package.json').name" 2>/dev/null || echo "$pkg") - $TESTS" >> $GITHUB_STEP_SUMMARY
                else
                  echo "❌ $(node -p "require('./packages/$pkg/package.json').name" 2>/dev/null || echo "$pkg") - Tests failed" >> $GITHUB_STEP_SUMMARY
                  echo "tests: $pkg" >> "$RUNNER_TEMP/prepublish-failures.txt"
                fi
              else
                echo "⚠️ $(node -p "require('./packages/$pkg/package.json').name" 2>/dev/null || echo "$pkg") - No tests configured" >> $GITHUB_STEP_SUMMARY
              fi
            fi
          done

      - name: Build check
        run: |
          set -o pipefail
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Build Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          IFS=',' read -ra PKG_ARRAY <<< "${{ steps.packages.outputs.packages }}"
          for pkg in "${PKG_ARRAY[@]}"; do
            pkg=$(echo "$pkg" | xargs)
            if [ -d "packages/$pkg" ] && [ -f "packages/$pkg/package.json" ]; then
              if grep -q '"build"' "packages/$pkg/package.json"; then
                echo "Building $(node -p "require('./packages/$pkg/package.json').name" 2>/dev/null || echo "$pkg")..."
                if npm run build --prefix "packages/$pkg" 2>&1 | tee /tmp/${pkg}-build.log; then
                  # Check dist directory
                  if [ -d "packages/$pkg/dist" ] && [ "$(ls -A packages/$pkg/dist)" ]; then
                    FILES=$(ls packages/$pkg/dist | wc -l)
                    echo "✅ $(node -p "require('./packages/$pkg/package.json').name" 2>/dev/null || echo "$pkg") - Built successfully ($FILES files)" >> $GITHUB_STEP_SUMMARY
                  else
                    echo "⚠️ $(node -p "require('./packages/$pkg/package.json').name" 2>/dev/null || echo "$pkg") - Built but dist is empty" >> $GITHUB_STEP_SUMMARY
                  fi
                else
                  echo "❌ $(node -p "require('./packages/$pkg/package.json').name" 2>/dev/null || echo "$pkg") - Build failed" >> $GITHUB_STEP_SUMMARY
                  echo "build: $pkg" >> "$RUNNER_TEMP/prepublish-failures.txt"
                fi
              else
                echo "⚠️ $(node -p "require('./packages/$pkg/package.json').name" 2>/dev/null || echo "$pkg") - No build script" >> $GITHUB_STEP_SUMMARY
              fi
            fi
          done

      - name: Package.json validation
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## package.json Validation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Package | name | version | main | types | license | publishConfig |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|------|---------|------|-------|---------|---------------|" >> $GITHUB_STEP_SUMMARY

          IFS=',' read -ra PKG_ARRAY <<< "${{ steps.packages.outputs.packages }}"
          for pkg in "${PKG_ARRAY[@]}"; do
            pkg=$(echo "$pkg" | xargs)
            if [ -f "packages/$pkg/package.json" ]; then
              NAME=$(node -p "require('./packages/$pkg/package.json').name || '❌'" 2>/dev/null)
              VERSION=$(node -p "require('./packages/$pkg/package.json').version || '❌'" 2>/dev/null)
              MAIN=$(node -p "require('./packages/$pkg/package.json').main ? '✅' : '❌'" 2>/dev/null)
              TYPES=$(node -p "require('./packages/$pkg/package.json').types ? '✅' : '❌'" 2>/dev/null)
              LICENSE=$(node -p "require('./packages/$pkg/package.json').license || '❌'" 2>/dev/null)
              PUB_CONFIG=$(node -p "require('./packages/$pkg/package.json').publishConfig?.access || '❌'" 2>/dev/null)

              echo "| $pkg | $NAME | $VERSION | $MAIN | $TYPES | $LICENSE | $PUB_CONFIG |" >> $GITHUB_STEP_SUMMARY
            fi
          done

      - name: Build browser bundles
        run: |
          set -o pipefail
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Browser Bundle Build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -d "packages/core" ]; then
            echo "Building all browser bundles..."
            if npm run build:browser --prefix packages/core 2>&1 | tee /tmp/bundle-build.log; then
              echo "✅ All browser bundles built successfully" >> $GITHUB_STEP_SUMMARY

              # List built bundles with sizes
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "### Bundle Sizes" >> $GITHUB_STEP_SUMMARY
              echo "| Bundle | Size | Gzipped |" >> $GITHUB_STEP_SUMMARY
              echo "|--------|------|---------|" >> $GITHUB_STEP_SUMMARY

              for file in packages/core/dist/hyperfixi*.js packages/core/dist/lokascript-*.js; do
                if [[ -f "$file" && ! "$file" == *.map ]]; then
                  filename=$(basename "$file")
                  size=$(wc -c < "$file" | tr -d ' ')
                  gzip_size=$(gzip -c "$file" | wc -c | tr -d ' ')
                  size_kb=$((size / 1024))
                  gzip_kb=$((gzip_size / 1024))
                  echo "| $filename | ${size_kb} KB | ${gzip_kb} KB |" >> $GITHUB_STEP_SUMMARY
                fi
              done
            else
              echo "❌ Bundle build failed" >> $GITHUB_STEP_SUMMARY
              exit 1
            fi
          fi

      - name: Validate exports
        # Runs AFTER "Build browser bundles" on purpose: core's exports map
        # includes dist/hyperfixi.js and dist/hyperfixi-hx-v4.js, which only
        # exist once the browser bundles are built. This step used to run
        # before them and flagged core with a false "Missing exports" ❌ on
        # every run (the 2026-07-13 release-bar summary-reading ritual).
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Export Validation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Verifying all package.json exports resolve to actual files..." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          IFS=',' read -ra PKG_ARRAY <<< "${{ steps.packages.outputs.packages }}"
          FAILED_PKGS=""

          # Detection is the validator's EXIT CODE (it exits 1 on missing
          # exports). The previous shape — `if cmd | tee log` plus a
          # `grep -c … || echo "0"` fallback — tested tee's exit (always 0)
          # and compared against a two-line "0\n0" string (never equal), so
          # EVERY package was marked ❌ in the summary of every historical
          # run; the honest-verdict validation run exposed it.
          for pkg in "${PKG_ARRAY[@]}"; do
            pkg=$(echo "$pkg" | xargs)
            if [ -d "packages/$pkg" ] && [ -f "packages/$pkg/package.json" ]; then
              echo "Validating $(node -p "require('./packages/$pkg/package.json').name") exports..."
              if node scripts/validate-exports.mjs "$pkg" > /tmp/${pkg}-exports.log 2>&1; then
                echo "✅ $(node -p "require('./packages/$pkg/package.json').name" 2>/dev/null || echo "$pkg") - All exports valid" >> $GITHUB_STEP_SUMMARY
              else
                cat /tmp/${pkg}-exports.log
                echo "❌ $(node -p "require('./packages/$pkg/package.json').name" 2>/dev/null || echo "$pkg") - exports invalid" >> $GITHUB_STEP_SUMMARY
                FAILED_PKGS="$FAILED_PKGS $pkg"
              fi
            fi
          done

          if [ -n "$FAILED_PKGS" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ **Export validation issues found in:**$FAILED_PKGS" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Run \`node scripts/validate-exports.mjs --fix-suggestions\` locally for details." >> $GITHUB_STEP_SUMMARY
            echo "exports:$FAILED_PKGS" >> "$RUNNER_TEMP/prepublish-failures.txt"
          fi

      - name: Bundle size limit checks
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Bundle Size Limit Validation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Size limits (gzipped bytes)
          MAX_LITE=4000           # 4 KB
          MAX_HYBRID=18000        # 18 KB (hyperfixi-hybrid-hx.js currently ~16.6 KB; bumped from 15 KB to reflect Phase 8 growth)
          MAX_BROWSER=290000      # 290 KB (actual: ~273 KB, allow headroom)

          failed=0

          # Check lite bundle
          if [[ -f "packages/core/dist/hyperfixi-lite.js" ]]; then
            size=$(gzip -c packages/core/dist/hyperfixi-lite.js | wc -c | tr -d ' ')
            if [[ "$size" -gt "$MAX_LITE" ]]; then
              echo "❌ hyperfixi-lite.js (${size} bytes gzip) exceeds limit (${MAX_LITE} bytes)" >> $GITHUB_STEP_SUMMARY
              failed=1
            else
              echo "✅ hyperfixi-lite.js (${size} bytes gzip) within limit (${MAX_LITE} bytes)" >> $GITHUB_STEP_SUMMARY
            fi
          fi

          # Check hybrid bundles
          for bundle in packages/core/dist/hyperfixi-hybrid-*.js; do
            if [[ -f "$bundle" ]]; then
              size=$(gzip -c "$bundle" | wc -c | tr -d ' ')
              filename=$(basename "$bundle")
              if [[ "$size" -gt "$MAX_HYBRID" ]]; then
                echo "❌ $filename (${size} bytes gzip) exceeds limit (${MAX_HYBRID} bytes)" >> $GITHUB_STEP_SUMMARY
                failed=1
              else
                echo "✅ $filename (${size} bytes gzip) within limit (${MAX_HYBRID} bytes)" >> $GITHUB_STEP_SUMMARY
              fi
            fi
          done

          # Check full browser bundle
          if [[ -f "packages/core/dist/hyperfixi.js" ]]; then
            size=$(gzip -c packages/core/dist/hyperfixi.js | wc -c | tr -d ' ')
            if [[ "$size" -gt "$MAX_BROWSER" ]]; then
              echo "❌ hyperfixi.js (${size} bytes gzip) exceeds limit (${MAX_BROWSER} bytes)" >> $GITHUB_STEP_SUMMARY
              failed=1
            else
              echo "✅ hyperfixi.js (${size} bytes gzip) within limit (${MAX_BROWSER} bytes)" >> $GITHUB_STEP_SUMMARY
            fi
          fi

          if [[ $failed -eq 1 ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ **Bundle size limit violations detected. Review bundle sizes before publishing.**" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: Start HTTP server
        run: |
          cd packages/core
          npx http-server ../.. -p 3000 -c-1 &
          echo $! > /tmp/http-server.pid
          sleep 3
          echo "HTTP server started on port 3000"

      - name: Bundle Compatibility Matrix
        run: |
          set -o pipefail
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Bundle Compatibility Matrix" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          cd packages/core

          if npx playwright test src/compatibility/browser-tests/bundle-compatibility.spec.ts --reporter=list 2>&1 | tee /tmp/bundle-compat.log; then
            echo "✅ All bundle compatibility tests passed" >> $GITHUB_STEP_SUMMARY

            # Extract and display the ASCII matrix from test output
            if grep -A 30 "HYPERFIXI BUNDLE COMPATIBILITY MATRIX" /tmp/bundle-compat.log > /tmp/matrix.txt; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "<details><summary>Bundle Feature Matrix</summary>" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
              cat /tmp/matrix.txt >> $GITHUB_STEP_SUMMARY
              echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
              echo "</details>" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "❌ Bundle compatibility tests failed" >> $GITHUB_STEP_SUMMARY
            echo "bundle-compatibility: playwright spec failed" >> "$RUNNER_TEMP/prepublish-failures.txt"
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "<details><summary>Test Failures</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            tail -100 /tmp/bundle-compat.log >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
          fi

      - name: htmx i18n orchestrator public API
        run: |
          set -o pipefail
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## htmx i18n Orchestrator Public API" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          cd packages/core

          # Guards the v2.5.0 terser regression class: vocab modules
          # (vocab/htmx/{lang}.js) depend on window.__hyperfixi_i18n.register
          # being reachable in the published bundles. Surfaced 2.5.0 → 2.5.1.
          if npx playwright test src/compatibility/browser-tests/i18n-orchestrator-api.spec.ts --reporter=list 2>&1 | tee /tmp/i18n-orchestrator-api.log; then
            echo "✅ window.__hyperfixi_i18n.register reachable in hybrid-hx + hybrid-hx-v4" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Orchestrator public API check failed — vocab modules will silently break" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "<details><summary>Test Failures</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            tail -60 /tmp/i18n-orchestrator-api.log >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

      - name: Stop HTTP server
        if: always()
        run: |
          if [ -f /tmp/http-server.pid ]; then
            kill $(cat /tmp/http-server.pid) || true
          fi

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: bundle-compatibility-report
          path: packages/core/playwright-report/
          retention-days: 3

      - name: Final verdict
        # A green job conclusion now MEANS the load-bearing checks passed:
        # typecheck, tests, builds, export validation, and the bundle
        # compatibility matrix record failures into $RUNNER_TEMP/
        # prepublish-failures.txt, and this step fails the job if any were
        # recorded. (Bundle sizes, the browser-bundle build, and the i18n
        # orchestrator spec already hard-fail their own steps.) The
        # required-files and package.json field TABLES stay advisory — many
        # packages ship without CHANGELOG/types by long-standing convention,
        # so those ❌ cells are review input, not gates.
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📋 Publication Readiness Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -s "$RUNNER_TEMP/prepublish-failures.txt" ]; then
            echo "### ❌ NOT ready to publish — failures recorded:" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat "$RUNNER_TEMP/prepublish-failures.txt" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Fix the items above and re-run this check." >> $GITHUB_STEP_SUMMARY
            echo "Failures recorded:"
            cat "$RUNNER_TEMP/prepublish-failures.txt"
            exit 1
          fi
          echo "### ✅ Load-bearing checks passed (typecheck, tests, builds, exports, bundles)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The required-files / package.json tables above are advisory — review any ❌ cells, then proceed to the \`Publish Packages\` workflow." >> $GITHUB_STEP_SUMMARY
