# CI workflow design notes:
#
# Goal: no PR<->push duplication, cheap doc-only PRs, and a reliable required-
# check gate — all without a merge queue (overkill for a solo maintainer).
#
#   pull_request — the authoritative gate. Runs the fast required checks
#   (build, export-validation, lint-typecheck, unit-tests) ALWAYS, plus the
#   heavy jobs (browser-tests, multilingual-validation, bundle-size, mcp-demos)
#   only when `changes.code == 'true'` (i.e. non-doc files changed). A doc-only
#   PR therefore runs just the fast required checks → reports green → mergeable,
#   while skipping the expensive jobs.
#
#   push to main / develop — post-merge effects ONLY:
#     - build      (needed by the two below)
#     - coverage   (uploads to Codecov)
#     - benchmarks (tracks perf trends on main)
#   The skew detectors (export-validation, lint-typecheck, unit-tests) are NOT
#   re-run on push: branch protection is `strict` (branch must be up to date),
#   so the PR already validated the exact merged result. This removes the only
#   PR<->push duplication.
#
#   `concurrency: cancel-in-progress` means rapid pushes to a PR cancel stale
#   runs, so the heavy jobs effectively run once per PR — most of a merge
#   queue's minutes benefit, with none of its operational complexity.
name: CI

on:
  # NOTE: deliberately no workflow-level `paths-ignore`. With required status
  # checks, a paths-ignored PR skips the whole workflow, so the required checks
  # never report and the PR is blocked forever ("Expected — waiting for status").
  # Doc-only changes are handled per-job instead: the `changes` job sets
  # code=false and the heavy jobs skip on it, while the fast required checks
  # still run + report — so a docs-only PR stays cheap AND mergeable.
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_OPTIONS: --max-old-space-size=4096

jobs:
  # ============================================
  # Job 0: Detect whether non-doc ("code") files changed.
  # Heavy jobs gate on this so doc-only PRs skip them. The fast required checks
  # do NOT gate on it — they must always report so the branch-protection gate
  # is satisfied (a doc-only PR still needs them green to merge).
  # ============================================
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    # Only consumed by the PR-only heavy jobs, so no need to run it on push.
    if: github.event_name == 'pull_request'
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          # `code` is true when any changed file is OUTSIDE the doc set.
          filters: |
            code:
              - '**'
              - '!**/*.md'
              - '!docs/**'
              - '!examples/**'
              - '!.claude/**'
              - '!**/*.txt'
              - '!.gitignore'
              - '!LICENSE'

  # ============================================
  # Job 1: Build All Packages (runs once, shared by all jobs)
  # ============================================
  build:
    name: Build All Packages
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Build order based on dependency graph:
      # 1. intent (no deps — framework re-exports types from it)
      # 2. framework (depends on intent)
      # 3. semantic (depends on framework)
      # 4. core (depends on semantic)
      # 5. patterns-reference (depends on semantic)
      # 6. i18n (depends on core, semantic)
      # 7. aot-compiler (depends on core, semantic)
      # 8. compilation-service (depends on aot-compiler, semantic)
      # 9. mcp-server (depends on semantic, patterns-reference, compilation-service)
      # 10. developer-tools
      # 11. vite-plugin (depends on core)
      # 12. language-server (depends on semantic, core)
      # NOTE: `intent-element` has no downstream build consumers — skipped
      # here to keep the CI footprint small. Add it if you want CI to
      # verify its build.
      - name: Build intent package
        run: npm run build --prefix packages/intent

      - name: Build framework package
        run: npm run build --prefix packages/framework

      - name: Build semantic package
        run: npm run build --prefix packages/semantic

      # Guard against the IIFE bundle externalizing `../core` (would throw at
      # load and leave window.LokaScriptSemantic undefined). Verified at the
      # dist level — unit tests resolve to source and can't catch this.
      - name: Verify semantic bundle output
        run: bash scripts/verify-semantic-bundle.sh

      - name: Build domain-bdd package
        run: npm run build --prefix packages/domain-bdd

      - name: Build domain-sql package
        run: npm run build --prefix packages/domain-sql

      - name: Build domain-jsx package
        run: npm run build --prefix packages/domain-jsx

      - name: Build domain-todo package
        run: npm run build --prefix packages/domain-todo

      - name: Build domain-behaviorspec package
        run: npm run build --prefix packages/domain-behaviorspec

      - name: Build domain-llm package
        run: npm run build --prefix packages/domain-llm

      - name: Build domain-flow package
        run: npm run build --prefix packages/domain-flow

      - name: Build domain-voice package
        run: npm run build --prefix packages/domain-voice

      - name: Build domain-learn package
        run: npm run build --prefix packages/domain-learn

      - name: Build domain-toolkit package
        run: npm run build --prefix packages/domain-toolkit

      - name: Build domain-config package
        run: npm run build --prefix packages/domain-config

      - name: Build behaviors package
        run: npm run build --prefix packages/behaviors

      - name: Build core package (full)
        run: npm run build --prefix packages/core

      - name: Build patterns-reference package
        run: npm run build --prefix packages/patterns-reference

      - name: Build i18n package
        run: npm run build --prefix packages/i18n

      - name: Build hyperscript-adapter package
        run: npm run build --prefix packages/hyperscript-adapter

      - name: Build aot-compiler package
        run: npm run build --prefix packages/aot-compiler

      - name: Build compilation-service package
        run: npm run build --prefix packages/compilation-service

      - name: Build planner package
        run: npm run build --prefix packages/planner

      - name: Build mcp-server package
        run: npm run build --prefix packages/mcp-server

      - name: Build mcp-multilingual-intent package
        run: npm run build --prefix packages/mcp-multilingual-intent

      - name: Build developer-tools package
        run: npm run build --prefix packages/developer-tools

      - name: Build server-bridge package
        run: npm run build --prefix packages/server-bridge

      - name: Build vite-plugin package
        run: npm run build --prefix packages/vite-plugin

      - name: Build language-server package
        run: npm run build --prefix packages/language-server

      # Plugin packages — reactivity before components (components depends on reactivity); both depend on core
      - name: Build reactivity package
        run: npm run build --prefix packages/reactivity

      # realtime depends only on core; must build before the core browser
      # bundles (browser-bundle.ts inlines reactivity + realtime dists)
      - name: Build realtime package
        run: npm run build --prefix packages/realtime

      - name: Build components package
        run: npm run build --prefix packages/components

      - name: Build speech package
        run: npm run build --prefix packages/speech

      # intent-element depends on @lokascript/intent (built above) + @hyperfixi/core
      - name: Build intent-element package
        run: npm run build --prefix packages/intent-element

      - name: Build all browser bundles
        run: npm run build:browser --prefix packages/core

      # Note: Semantic browser bundles are already built by "npm run build" via tsup.config.ts
      # Running build:browser separately would wipe the dist folder and delete index.d.ts

      - name: Verify build output before upload
        run: |
          echo "=== Semantic dist files before upload ==="
          ls -la packages/semantic/dist/ | head -30
          echo "=== Checking for index.d.ts ==="
          ls -la packages/semantic/dist/index* || echo "No index files!"
          echo "=== File count ==="
          find packages/semantic/dist -type f | wc -l

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-artifacts
          path: |
            packages/intent/dist/
            packages/framework/dist/
            packages/domain-bdd/dist/
            packages/domain-sql/dist/
            packages/domain-jsx/dist/
            packages/domain-todo/dist/
            packages/domain-behaviorspec/dist/
            packages/domain-llm/dist/
            packages/domain-flow/dist/
            packages/domain-voice/dist/
            packages/domain-learn/dist/
            packages/domain-toolkit/dist/
            packages/domain-config/dist/
            packages/semantic/dist/
            packages/i18n/dist/
            packages/core/dist/
            packages/behaviors/dist/
            packages/patterns-reference/dist/
            packages/hyperscript-adapter/dist/
            packages/aot-compiler/dist/
            packages/compilation-service/dist/
            packages/planner/dist/
            packages/mcp-server/dist/
            packages/mcp-multilingual-intent/dist/
            packages/developer-tools/dist/
            packages/server-bridge/dist/
            packages/vite-plugin/dist/
            packages/language-server/dist/
            packages/reactivity/dist/
            packages/realtime/dist/
            packages/components/dist/
            packages/speech/dist/
            packages/intent-element/dist/
          retention-days: 3

  # ============================================
  # Job 2: Export Validation
  # ============================================
  export-validation:
    name: Export Validation
    runs-on: ubuntu-latest
    needs: build
    # PR-only: `strict` branch protection means the PR validated the merged
    # result, so re-running this on the post-merge push would be redundant.
    if: github.event_name == 'pull_request'
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-artifacts
          path: packages

      - name: Rebuild workspace links
        run: |
          rm -rf node_modules/@hyperfixi node_modules/@lokascript
          npm install

      - name: Validate all package exports
        run: |
          echo "## Export Validation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Verifying package.json exports match actual dist files..." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Run export validation for published packages
          node scripts/validate-exports.mjs core semantic i18n vite-plugin mcp-server patterns-reference aot-compiler compilation-service language-server --strict 2>&1 | tee /tmp/export-validation.log

          # Parse results for summary
          if grep -q "✅" /tmp/export-validation.log; then
            echo "✅ All package exports validated successfully" >> $GITHUB_STEP_SUMMARY
          fi

          if grep -q "❌" /tmp/export-validation.log; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Missing Exports" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            grep -A 10 "Missing exports" /tmp/export-validation.log >> $GITHUB_STEP_SUMMARY || true
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          fi

      # Bare-Node import of @hyperfixi/core (+ /commands, /behaviors): guards
      # the dom-globals shim ordering ahead of morphlex's module-scope
      # `Element.prototype` access (see packages/core/src/lib/dom-globals-shim.ts).
      - name: Bare-Node import check (core)
        run: node scripts/check-node-import.mjs

  # ============================================
  # Job 3: Lint & Typecheck
  # ============================================
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    needs: build
    # PR-only (see export-validation): redundant on push under `strict`.
    if: github.event_name == 'pull_request'
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      # Cheap guard: zero-dep node script that verifies ci.yml builds every
      # workspace runtime dependency before its consumer. Runs before
      # `npm ci` so drift fails fast without paying install cost.
      - name: Verify CI build order
        run: node scripts/check-ci-build-order.cjs

      # Cheap guard: zero-dep node script that fails if package versions have
      # drifted apart (the monorepo publishes uniformly).
      - name: Validate package versions
        run: node scripts/validate-versions.cjs

      - name: Install dependencies
        run: npm ci

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-artifacts
          path: packages

      - name: Verify artifact extraction
        run: |
          echo "=== Current directory ==="
          pwd
          echo "=== Checking semantic dist files ==="
          ls -la packages/semantic/dist/ | head -20
          echo "=== Checking for index.d.ts ==="
          ls -la packages/semantic/dist/index* || echo "No index files found!"
          echo "=== Checking all .d.ts files ==="
          find packages/semantic/dist -name "*.d.ts" -type f
          echo "=== Checking workspace symlink ==="
          ls -la node_modules/@hyperfixi/ 2>/dev/null || echo "No @hyperfixi symlinks yet"
          ls -la node_modules/@lokascript/ 2>/dev/null || echo "No @lokascript symlinks yet"

      - name: Rebuild workspace links
        run: |
          # Remove stale workspace symlinks and reinstall
          rm -rf node_modules/@hyperfixi node_modules/@lokascript
          npm install

      - name: Run ESLint (public packages)
        run: |
          npm run lint --prefix packages/core --if-present
          npm run lint --prefix packages/semantic --if-present
          npm run lint --prefix packages/i18n --if-present
          npm run lint --prefix packages/vite-plugin --if-present

      - name: Typecheck all packages
        run: |
          npm run typecheck --prefix packages/core
          npm run typecheck --prefix packages/semantic
          npm run typecheck --prefix packages/i18n
          npm run typecheck --prefix packages/hyperscript-adapter
          npm run typecheck --prefix packages/vite-plugin
          npm run typecheck --prefix packages/patterns-reference
          npm run typecheck --prefix packages/aot-compiler
          npm run typecheck --prefix packages/compilation-service
          npm run typecheck --prefix packages/mcp-server
          npm run typecheck --prefix packages/language-server

      - name: Verify reference data
        run: npm run verify:reference --prefix packages/core

      - name: Lint domains (cross-file invariants)
        run: npm run lint:domains

  # ============================================
  # Job 4: Unit Tests
  # ============================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build
    # PR-only (see export-validation): redundant on push under `strict`.
    if: github.event_name == 'pull_request'
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-artifacts
          path: packages

      - name: Rebuild workspace links
        run: |
          # Remove stale workspace symlinks and reinstall
          rm -rf node_modules/@hyperfixi node_modules/@lokascript
          npm install

      # Note: vitest with pool:'forks' may hang after tests complete due to
      # esbuild daemon keeping worker processes alive. The timeout wrapper
      # kills the process after 5 minutes and treats exit code 124 (timeout)
      # as success, since the tests themselves completed.
      - name: Test core
        # The core `test` script (scripts/vitest-run.sh) judges pass/fail from
        # the reporter summary, so it handles the esbuild post-run daemon hang
        # correctly: a benign 124 AFTER tests complete is a PASS, but a mid-run
        # hang (no summary) or any failing test is a real FAIL. Trust its exit
        # code — do NOT blanket-treat 124 as success (that previously masked a
        # hung suite and hid every failure behind a false green).
        run: npm test --prefix packages/core

      - name: Test semantic
        run: npm test --prefix packages/semantic

      - name: Test i18n
        run: npm test --prefix packages/i18n

      - name: Test hyperscript-adapter
        run: npm test --prefix packages/hyperscript-adapter

      - name: Test vite-plugin
        run: npm test --prefix packages/vite-plugin

      - name: Initialize patterns-reference database
        # Use db:init:force because patterns.db is committed to the repo
        # (per packages/patterns-reference/.gitignore `!data/patterns.db`),
        # so the bare db:init bails with "Database already exists".
        run: npm run db:init:force --prefix packages/patterns-reference

      - name: Test patterns-reference
        run: npm test --prefix packages/patterns-reference

      - name: Test aot-compiler
        run: npm test --prefix packages/aot-compiler

      - name: Test compilation-service
        run: npm test --prefix packages/compilation-service

      - name: Test mcp-server
        run: npm test --prefix packages/mcp-server

      - name: Test mcp-multilingual-intent
        run: npm test --prefix packages/mcp-multilingual-intent -- --run

      - name: Test domain-bdd
        run: npm test --prefix packages/domain-bdd

      - name: Test domain-sql
        run: npm test --prefix packages/domain-sql

      - name: Test domain-jsx
        run: npm test --prefix packages/domain-jsx

      - name: Test domain-todo
        run: npm test --prefix packages/domain-todo

      - name: Test domain-behaviorspec
        run: npm test --prefix packages/domain-behaviorspec

      - name: Test domain-llm
        run: npm test --prefix packages/domain-llm

      - name: Test domain-flow
        run: npm test --prefix packages/domain-flow

      - name: Test domain-voice
        run: npm test --prefix packages/domain-voice

      - name: Test domain-learn
        run: npm test --prefix packages/domain-learn

      - name: Test domain-config
        run: npm test --prefix packages/domain-config

      - name: Test language-server
        run: npm test --prefix packages/language-server -- --run

      - name: Test reactivity
        run: npm test --prefix packages/reactivity -- --run

      - name: Test realtime
        run: npm test --prefix packages/realtime -- --run

      - name: Test speech
        run: npm test --prefix packages/speech -- --run

      - name: Test components
        run: npm test --prefix packages/components -- --run

  # ============================================
  # Job 5: Coverage Report
  # ============================================
  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-artifacts
          path: packages

      - name: Rebuild workspace links
        run: |
          # Remove stale workspace symlinks and reinstall
          rm -rf node_modules/@hyperfixi node_modules/@lokascript
          npm install

      - name: Generate coverage - core
        # test:coverage uses scripts/vitest-run.sh, which judges pass/fail from
        # the reporter summary (benign post-run 124 = PASS; mid-run hang or any
        # failure = FAIL). Trust its exit code; give it a longer timeout since
        # coverage instrumentation is slower than a plain run.
        run: VITEST_TIMEOUT=300 npm run test:coverage --prefix packages/core

      - name: Generate coverage - semantic
        run: npm test --prefix packages/semantic -- --coverage

      - name: Generate coverage - i18n
        run: npm run test:coverage --prefix packages/i18n

      - name: Upload core coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: packages/core/coverage/lcov.info
          flags: core
          name: core-coverage
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Upload semantic coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: packages/semantic/coverage/lcov.info
          flags: semantic
          name: semantic-coverage
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Upload i18n coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: packages/i18n/coverage/lcov.info
          flags: i18n
          name: i18n-coverage
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Generate coverage - language-server
        run: npm test --prefix packages/language-server -- --coverage

      - name: Upload language-server coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: packages/language-server/coverage/lcov.info
          flags: language-server
          name: language-server-coverage
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # ============================================
  # Job 6: Browser Tests (Playwright)
  # ============================================
  # Slim post-merge: this job already ran against the merged-as-PR code.
  # Re-running it on `push` to main/develop only catches merge skew, which
  # is rare and which `build` + `unit-tests` cover for the vast majority
  # of cases. Skipping it post-merge saves ~30 min runner time per merge.
  browser-tests:
    name: Browser Tests
    runs-on: ubuntu-latest
    needs: [build, changes]
    # Heavy job: PR-only AND only when non-doc files changed (skips doc PRs).
    if: github.event_name == 'pull_request' && needs.changes.outputs.code == 'true'
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-artifacts
          path: packages

      - name: Rebuild workspace links
        run: |
          # Remove stale workspace symlinks and reinstall
          rm -rf node_modules/@hyperfixi node_modules/@lokascript
          npm install

      - name: Verify browser test artifacts
        run: |
          echo "=== Semantic bundle check ==="
          ls -la packages/semantic/dist/browser.global.js || echo "MISSING: browser.global.js"
          echo "=== Core bundle check ==="
          ls -la packages/core/dist/hyperfixi.js || echo "MISSING: hyperfixi.js"
          ls -la packages/core/dist/hyperfixi-multilingual.js || echo "MISSING: hyperfixi-multilingual.js"
          ls -la packages/core/dist/hyperfixi-hybrid-complete.js || echo "MISSING: hyperfixi-hybrid-complete.js"
          echo "=== i18n bundle check ==="
          ls -la packages/i18n/dist/lokascript-i18n.min.js || echo "MISSING: lokascript-i18n.min.js"

      - name: Run Playwright tests
        run: npx playwright test --project=quick
        working-directory: packages/core

      # NOTE: paths are relative to the repo root, NOT this job's
      # working-directory. The report/traces are written under
      # packages/core/ (the Playwright cwd), so the path must be
      # `packages/core/...` — a bare `./core/...` resolves to a
      # nonexistent repo-root dir and silently uploads nothing.
      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: packages/core/playwright-report/
          retention-days: 3

      # Traces (trace: 'on-first-retry') + error-context land in test-results/.
      # Without this, a failing run leaves nothing to inspect — which is exactly
      # why the semantic-bundle load flake went undiagnosed for so long.
      - name: Upload Playwright traces
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-traces
          path: packages/core/test-results/**
          retention-days: 3
          if-no-files-found: ignore

  # ============================================
  # Job 7: Multilingual Validation
  # ============================================
  # Slim post-merge: PR-only. See note on browser-tests above.
  multilingual-validation:
    name: Multilingual Validation
    runs-on: ubuntu-latest
    needs: [build, changes]
    # Heavy job: PR-only AND only when non-doc files changed (skips doc PRs).
    if: github.event_name == 'pull_request' && needs.changes.outputs.code == 'true'
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-artifacts
          path: packages

      - name: Rebuild workspace links
        run: |
          # Remove stale workspace symlinks and reinstall
          rm -rf node_modules/@hyperfixi node_modules/@lokascript
          npm install

      - name: Populate patterns database
        run: npm run populate --prefix packages/patterns-reference

      # Quick mode (10 core patterns/lang) is genuinely expected at 100% — a real
      # gate, no continue-on-error. A drop here is a real regression in core
      # multilingual parsing.
      - name: Test priority languages (quick mode)
        run: |
          cd packages/testing-framework
          npx tsx src/multilingual/cli.ts --languages en,ja,ko,es,zh,ar --quick --bundle browser-priority

      # Full mode (164 patterns/lang) has a KNOWN, documented gap: newer feature
      # patterns (reactivity/streaming/components/possessive-dot, added 2026-05)
      # lack complete non-English coverage, so the absolute rate is ~85%, not 100%
      # (HE/TL/AR/KO are the laggards — tracked for language-coverage work). This
      # step gates on REGRESSION vs the committed baseline: a language fails CI if
      # its parse rate drops >2pts below baseline (per-pattern flips on borderline-
      # confidence patterns are reported but don't fail the gate). It ALSO ratchets
      # parse *fidelity*: if >3 faithful baseline passes become degenerate (parse
      # non-null but lose >50% of the English command structure) the gate fails —
      # see the "Multilingual parse rate ≠ fidelity" note in CLAUDE.md. Regenerate the
      # baseline after an INTENTIONAL coverage change — IMPORTANT: populate first
      # so the DB matches CI:
      #   npm run populate --prefix packages/patterns-reference
      #   cd packages/testing-framework && npx tsx src/multilingual/cli.ts \
      #     --languages <…> --full --bundle browser-priority --save-baseline \
      #     --baseline ./baselines/multilingual-priority.json
      # QU (Quechua), BN (Bengali), MS (Malay) are excluded — under development.
      - name: Test supported languages (full mode, regression gate)
        run: |
          cd packages/testing-framework
          npx tsx src/multilingual/cli.ts --languages ar,de,en,es,fr,he,hi,id,it,ja,ko,pl,pt,ru,sw,th,tl,tr,uk,vi,zh --full --bundle browser-priority --regression --baseline ./baselines/multilingual-priority.json

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: multilingual-test-results
          path: ./testing-framework/test-results/
          retention-days: 3

  # ============================================
  # Job 8: Bundle Size Analysis
  # ============================================
  # Slim post-merge: PR-only. The size report on a PR is what reviewers
  # actually look at; the post-merge repeat against an identical artifact
  # has no readers. Pre-publish-check.yml still gates bundle sizes at
  # publish time as a final guard.
  bundle-size:
    name: Bundle Size Analysis
    runs-on: ubuntu-latest
    needs: [build, changes]
    # Heavy job: PR-only AND only when non-doc files changed (skips doc PRs).
    if: github.event_name == 'pull_request' && needs.changes.outputs.code == 'true'
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-artifacts
          path: packages

      - name: Rebuild workspace links
        run: |
          # Remove stale workspace symlinks and reinstall
          rm -rf node_modules/@hyperfixi node_modules/@lokascript
          npm install

      - name: Analyze bundle sizes
        run: |
          echo "## Bundle Size Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Core Bundles" >> $GITHUB_STEP_SUMMARY
          echo "| Bundle | Size | Gzipped |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|------|---------|" >> $GITHUB_STEP_SUMMARY

          for file in packages/core/dist/hyperfixi*.js; do
            if [[ -f "$file" && ! "$file" == *.map ]]; then
              filename=$(basename "$file")
              size=$(wc -c < "$file" | tr -d ' ')
              gzip_size=$(gzip -c "$file" | wc -c | tr -d ' ')
              size_kb=$((size / 1024))
              gzip_kb=$((gzip_size / 1024))
              echo "| $filename | ${size_kb} KB | ${gzip_kb} KB |" >> $GITHUB_STEP_SUMMARY
            fi
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Semantic Bundles" >> $GITHUB_STEP_SUMMARY
          echo "| Bundle | Size | Gzipped |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|------|---------|" >> $GITHUB_STEP_SUMMARY

          for file in packages/semantic/dist/browser*.js; do
            if [[ -f "$file" && ! "$file" == *.map ]]; then
              filename=$(basename "$file")
              size=$(wc -c < "$file" | tr -d ' ')
              gzip_size=$(gzip -c "$file" | wc -c | tr -d ' ')
              size_kb=$((size / 1024))
              gzip_kb=$((gzip_size / 1024))
              echo "| $filename | ${size_kb} KB | ${gzip_kb} KB |" >> $GITHUB_STEP_SUMMARY
            fi
          done

      - name: Check size limits
        run: |
          # Size limits (gzipped bytes)
          MAX_LITE=4000           # 4 KB
          MAX_HYBRID=15000        # 15 KB
          MAX_BROWSER=230000      # 230 KB (actual: ~203-208 KB, allow headroom)

          failed=0

          if [[ -f "packages/core/dist/hyperfixi-lite.js" ]]; then
            size=$(gzip -c packages/core/dist/hyperfixi-lite.js | wc -c | tr -d ' ')
            if [[ "$size" -gt "$MAX_LITE" ]]; then
              echo "::warning::hyperfixi-lite.js ($size bytes gzip) exceeds limit ($MAX_LITE bytes)"
            fi
          fi

          if [[ -f "packages/core/dist/hyperfixi-hybrid-complete.js" ]]; then
            size=$(gzip -c packages/core/dist/hyperfixi-hybrid-complete.js | wc -c | tr -d ' ')
            if [[ "$size" -gt "$MAX_HYBRID" ]]; then
              echo "::warning::hyperfixi-hybrid-complete.js ($size bytes gzip) exceeds limit ($MAX_HYBRID bytes)"
            fi
          fi

          if [[ -f "packages/core/dist/hyperfixi.js" ]]; then
            size=$(gzip -c packages/core/dist/hyperfixi.js | wc -c | tr -d ' ')
            echo "hyperfixi.js gzipped: $size bytes (limit: $MAX_BROWSER bytes)"
            if [[ "$size" -gt "$MAX_BROWSER" ]]; then
              echo "::warning::hyperfixi.js ($size bytes gzip) exceeds limit ($MAX_BROWSER bytes)"
            fi
          fi

          exit $failed

  # ============================================
  # Job 9: MCP Multilingual Intent — demos + compat test
  # ============================================
  # Starts the Hono Siren API in background, runs the Siren-compat test
  # and the three IDE integration demos (EN ≡ JA/AR/KO schema equivalence).
  # Captures demo output as an artifact so the landing page can embed it.
  # Reuses build artifacts from Job 1 — no rebuild cost.
  #
  # Slim post-merge: PR-only. The committed `demo-output.txt` staleness
  # check is what matters here, and it already ran on the PR. Re-running
  # against the merged code produces the same output (deterministic
  # demos against the same build artifacts).
  mcp-demos:
    name: MCP Multilingual Demos
    runs-on: ubuntu-latest
    needs: [build, changes]
    # Heavy job: PR-only AND only when non-doc files changed (skips doc PRs).
    if: github.event_name == 'pull_request' && needs.changes.outputs.code == 'true'
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-artifacts
          path: packages

      - name: Rebuild workspace links
        run: |
          rm -rf node_modules/@hyperfixi node_modules/@lokascript
          npm install

      - name: Start Hono Siren server
        working-directory: packages/mcp-multilingual-intent
        run: |
          nohup npm run dev > /tmp/mcp-server.log 2>&1 &
          echo $! > /tmp/mcp-server.pid
          # Wait up to ~15s for /health to return 200
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3030/health > /dev/null 2>&1; then
              echo "server up after ${i} tries"
              break
            fi
            sleep 0.5
          done
          curl -fsS http://localhost:3030/health || {
            echo "server failed to start"; cat /tmp/mcp-server.log; exit 1;
          }

      - name: Run Siren compatibility test
        run: npm run mcp:test --prefix packages/mcp-multilingual-intent

      - name: Run IDE integration demos (capture output)
        run: npm run demos:capture --prefix packages/mcp-multilingual-intent

      - name: Check committed demo-output.txt is up to date
        run: |
          # Fail the job if the committed landing-page artifact drifts from
          # what the demos actually produce. To fix: run
          # `npm run demos:capture --prefix packages/mcp-multilingual-intent`
          # locally and commit the updated file.
          if ! git diff --exit-code --stat \
            packages/mcp-multilingual-intent/landing/demo-output.txt; then
            echo "::error::demo-output.txt is out of date. Run 'npm run demos:capture --prefix packages/mcp-multilingual-intent' and commit the result."
            exit 1
          fi

      - name: Stop server
        if: always()
        run: |
          if [ -f /tmp/mcp-server.pid ]; then
            kill "$(cat /tmp/mcp-server.pid)" 2>/dev/null || true
          fi

      - name: Upload demo output
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mcp-demo-output
          path: packages/mcp-multilingual-intent/landing/demo-output.txt
          retention-days: 7

  # ============================================
  # Job 10: Performance Benchmarks (main branch only)
  # ============================================
  benchmarks:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-artifacts
          path: packages

      - name: Rebuild workspace links
        run: |
          # Remove stale workspace symlinks and reinstall
          rm -rf node_modules/@hyperfixi node_modules/@lokascript
          npm install

      - name: Run benchmarks
        run: npm run bench:run --prefix packages/core
        continue-on-error: true

      - name: Upload benchmark results
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results
          path: ./core/benchmark-results/
          retention-days: 3
