<!DOCTYPE html>
<html>
<head>
  <title>LokaScript Extension Test</title>
</head>
<body>
  <!-- Test completions: type "on " after the underscore and trigger completions -->
  <button _="on click toggle .active">Toggle Active</button>

  <!-- Test hover: hover over "toggle" to see documentation -->
  <button _="on mouseenter add .highlight">Highlight on Hover</button>

  <!-- Test diagnostics: this has an unclosed quote -->
  <button _="put 'hello into #msg">Has Error</button>

  <!-- Test multilingual -->
  <button _="al hacer clic alternar .active">Spanish</button>

  <!-- Test symbols: should appear in outline -->
  <div _="
    on click toggle .open
    on mouseenter add .hover
  ">Multiple Events</div>

  <script type="text/hyperscript">
    behavior Draggable
      on mousedown
        add .dragging to me
      on mouseup
        remove .dragging from me
    end

    def greet(name)
      log 'Hello ' + name
    end
  </script>

  <!-- ============================================================ -->
  <!-- v2 / v2.1 component features — for visual smoke testing       -->
  <!-- ============================================================ -->

  <!-- Init script reads `attrs.X` and writes a reactive `^var` -->
  <template component="my-counter" _="set ^count to attrs.initialCount">
    <button _="on click increment ^count">
      Count: ${^count}
    </button>
    #if ^count > 10
      <span class="warn">High!</span>
    #else
      <span class="ok">OK</span>
    #end
  </template>

  <!-- Iteration with #for, plus #else for empty fallback -->
  <template component="my-list" _="set ^items to ['a', 'b', 'c']">
    <ul>
      #for item in ^items
        <li>${item}</li>
      #else
        <li>No items.</li>
      #end
    </ul>
  </template>

  <!-- Manual dom-scope boundary (^vars don't leak past this) -->
  <div dom-scope="isolated" _="set ^localFlag to true">
    <button _="if ^localFlag then add .on to me">Toggle local</button>
  </div>

  <!-- Component instances -->
  <my-counter initial-count="5"></my-counter>
  <my-list></my-list>
</body>
</html>
